name: Scrape and Update Stocks

on:
  # Trigger every minute
  schedule:
    - cron: '*/1 * * * *'  # Every minute
  workflow_dispatch:  # Allows manual triggering from the GitHub Actions tab

jobs:
  scrape_and_upload:
    runs-on: ubuntu-latest  # Choose the appropriate runner

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'  # You can change this to the version you prefer

      # Install dependencies (firebase-tools and puppeteer for scraping)
      - name: Install dependencies
        run: |
          npm install -g firebase-tools  # Install Firebase CLI
          npm install  # Install dependencies from your package.json

      # Run the scraper script to fetch stock data and upload to Firebase
      - name: Run the scraper and upload to Firebase
        run: |
          echo "Running scraper..."
          node scraper.js  # Ensure scraper.js is in your repo and contains the scraping logic
